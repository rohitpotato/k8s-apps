apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alert-rules
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: k8s-apps-project
  sources:
  - repoURL: https://github.com/rohitpotato/k8s-apps.git
    targetRevision: main
    path: alerts/rules
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
