apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: k8s-apps-project
  sources:
  - repoURL: oci://quay.io/jetstack/charts/cert-manager
    chart: cert-manager
    targetRevision: 1.20.0
    helm:
      valueFiles:
      - $values/cert-manager/values.yaml 
  - repoURL: https://github.com/rohitpotato/k8s-apps.git
    targetRevision: main
    ref: values
  - repoURL: https://github.com/rohitpotato/k8s-apps.git
    targetRevision: main
    path: cert-manager
    directory:
      include: enable-https.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true