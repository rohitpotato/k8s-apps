apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: frontend-alert-routing
  namespace: monospaced
  labels:
    alertmanagerConfig: frontend
spec:
  route:
    receiver: slack-notifications
    groupBy: ["alertname", "service", "severity"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    matchers:
      - name: team
        value: monospaced
      - name: severity
        value: critical
        matchType: "="

  receivers:
    - name: slack-notifications
      slackConfigs:
        - apiURL:
            name: slack-webhook
            key: webhook_url
          channel: '#alerts'
          sendResolved: true
          title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
          text: >-
            {{ range .Alerts }}
            *Alert:* {{ .Labels.alertname }}
            *Severity:* {{ .Labels.severity }}
            *Service:* {{ .Labels.service }}
            *Description:* {{ .Annotations.summary }}
            {{ end }}
