kind: ConfigMap
apiVersion: v1
metadata:
  name: nginx-exporter-config
  namespace: monospaced
data:
  config.hcl: |
    listen {
      port = 4040
      address = "0.0.0.0"
    }

    namespace "nginx" {
      source = {
        files = ["/var/log/nginx/exporter-access.log"]
      }

      format = "json"

      labels {
        app = "monospaced-frontend"
      }

      relabel "host" {
        from = "host"
      }

      relabel "method" {
        from = "method"
      }

      # Be careful: raw uri can be high-cardinality.
      # For your static site, this is acceptable initially.
      relabel "uri" {
        from = "uri"
      }

      histogram_buckets = [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10]
    }