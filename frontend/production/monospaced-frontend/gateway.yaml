apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: web-gateway
  namespace: monospaced
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: rohitpotato.xyz
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: rohitpotato-xyz-tls
      allowedRoutes:
        namespaces:
          from: Same