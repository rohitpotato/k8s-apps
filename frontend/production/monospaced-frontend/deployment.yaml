apiVersion: apps/v1
kind: Deployment
metadata:
  name: monospaced-frontend
  namespace: monospaced
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monospaced-frontend
  template:
    metadata:
      labels:
        app: monospaced-frontend
    spec:
      nodeSelector:
        nodeRole: worker
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - monospaced-frontend
              topologyKey: kubernetes.io/hostname
      containers:
        - name: monospaced-frontend
          image: ghcr.io/rohitpotato/monospaced-stack/frontend:main-f0385ba
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "50Mi"
              cpu: "30m"
            limits:
              memory: "100Mi"
              cpu: "60m"